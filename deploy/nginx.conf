# /etc/nginx/sites-available/swforhumans.com
# Nginx config for Software For Humans — static bilingual site
# Mirrors the shopledger.app pattern: releases dir + current symlink

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name swforhumans.com www.swforhumans.com;
    return 301 https://swforhumans.com$request_uri;
}

# Redirect www to apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.swforhumans.com;

    ssl_certificate /etc/letsencrypt/live/swforhumans.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swforhumans.com/privkey.pem;

    return 301 https://swforhumans.com$request_uri;
}

# Main server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name swforhumans.com;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/swforhumans.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swforhumans.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL_SFH:10m;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Document root — symlink to current release
    root /var/www/swforhumans.com/current;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static assets — cache aggressively (if you add /assets/ later)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Favicons and root static files
    location ~* \.(ico|png|webp|svg|txt|xml|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Root and HTML — never cache (so new deploys take effect immediately)
    location / {
        try_files $uri $uri/ =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Block dotfiles except .well-known (for Let's Encrypt renewal)
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/swforhumans.access.log;
    error_log /var/log/nginx/swforhumans.error.log;
}
